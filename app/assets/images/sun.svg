<svg version="1.1" id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <style>
    :root {
      --sun-core:     #FFDD00;     /* bright yellow center */
      --sun-glow:     #FFEE77;     /* slightly lighter glow/inner ring */
      --sun-rays:     #FFB700;     /* warm orange-yellow rays */
      --stroke-color: transparent;
      --stroke-width: 0;
    }

    #rays       { fill: var(--sun-rays);       stroke: var(--stroke-color); stroke-width: var(--stroke-width); }
    #inner-glow { fill: var(--sun-glow);       stroke: var(--stroke-color); stroke-width: var(--stroke-width); }
    #core       { fill: var(--sun-core);       stroke: var(--stroke-color); stroke-width: var(--stroke-width); }
  </style>

